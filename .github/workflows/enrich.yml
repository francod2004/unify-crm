name: Unify Enrichment

on:
  schedule:
    - cron: '0 16 * * *'  # 12:00 PM EDT daily -- between sourcer (10 AM) and cold email (2 PM)
  workflow_dispatch:
    inputs:
      max:
        description: 'Max prospects to enrich'
        required: false
        default: '100'
      backfill:
        description: 'Backfill mode: sweep prospects with empty email regardless of enriched_at'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --disable-pip-version-check -r requirements.txt

      - name: Run Enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          FRANCO_PHONE: ${{ secrets.FRANCO_PHONE }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          BACKFILL_FLAG=""
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            BACKFILL_FLAG="--backfill"
          fi
          python enrichment_agent.py --max ${{ github.event.inputs.max || '100' }} $BACKFILL_FLAG
