name: Unify Enrichment (Local)

on:
  schedule:
    - cron: '23 14,17,20,23 * * *'  # 10:23 AM, 1:23 PM, 4:23 PM, 7:23 PM EDT (off-peak minute)
  workflow_dispatch:
    inputs:
      max:
        description: 'Max prospects to enrich'
        required: false
        default: '50'

jobs:
  enrich:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 45
    env:
      PYTHON: C:\UnifyPython\3.12.10\python.exe
    steps:
      - uses: actions/checkout@v4

      - name: Verify portable Python
        shell: powershell
        run: |
          & "$env:PYTHON" --version
          & "$env:PYTHON" -m pip --version

      - name: Install dependencies
        shell: powershell
        run: |
          & "$env:PYTHON" -m pip install --disable-pip-version-check --quiet requests beautifulsoup4 lxml dnspython

      - name: Run Enrichment
        shell: powershell
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          FRANCO_PHONE: ${{ secrets.FRANCO_PHONE }}
        run: |
          & "$env:PYTHON" cold_email_agent.py --enrich-only --max ${{ github.event.inputs.max || '50' }}
