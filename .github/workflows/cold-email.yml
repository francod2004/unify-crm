name: Unify Cold Email Drafts

on:
  schedule:
    - cron: '30 14,17,20,23 * * *'  # 10:30 AM, 1:30 PM, 4:30 PM, 7:30 PM EDT (30 min after enrichment)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Agent mode'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - redraft
          - send
      max:
        description: 'Max prospects to process'
        required: false
        default: '50'

jobs:
  cold-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml dnspython google-auth google-auth-oauthlib google-api-python-client

      - name: Run Cold Email Agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          FRANCO_PHONE: ${{ secrets.FRANCO_PHONE }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: python cold_email_agent.py --${{ github.event.inputs.mode || 'draft' }} --max ${{ github.event.inputs.max || '50' }}
